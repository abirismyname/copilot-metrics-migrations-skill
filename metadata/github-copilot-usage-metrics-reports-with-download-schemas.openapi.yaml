components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: GitHub token

  parameters:
    Accept:
      name: Accept
      in: header
      required: false
      description: Setting to application/vnd.github+json is recommended.
      schema:
        type: string
        default: application/vnd.github+json
        example: application/vnd.github+json

    GitHubApiVersion:
      name: X-GitHub-Api-Version
      in: header
      required: false
      description: GitHub REST API version.
      schema:
        type: string
        default: "2026-03-10"
        example: "2026-03-10"

    Enterprise:
      name: enterprise
      in: path
      required: true
      description: The slug version of the enterprise name.
      schema:
        type: string
      example: octocorp

    Org:
      name: org
      in: path
      required: true
      description: The organization name. The name is not case sensitive.
      schema:
        type: string
      example: octo-org

    Day:
      name: day
      in: query
      required: true
      description: The day to request data for, in YYYY-MM-DD format.
      schema:
        type: string
        format: date
      example: "2025-07-01"

  schemas:
    OneDayReportLinks:
      type: object
      additionalProperties: false
      required:
        - download_links
        - report_day
      properties:
        download_links:
          type: array
          description: Signed URLs for downloading report file parts.
          minItems: 1
          items:
            type: string
            format: uri
        report_day:
          type: string
          format: date
          description: The complete processed day covered by the report.

    DateRangeReportLinks:
      type: object
      additionalProperties: false
      required:
        - download_links
        - report_start_day
        - report_end_day
      properties:
        download_links:
          type: array
          description: Signed URLs for downloading report file parts.
          minItems: 1
          items:
            type: string
            format: uri
        report_start_day:
          type: string
          format: date
          description: First day covered by the 28-day report.
        report_end_day:
          type: string
          format: date
          description: Last day covered by the 28-day report.


    CopilotUserUsageMetricsReport:
      type: array
      description: |
        Downloaded user-level Copilot usage metrics report JSON. GitHub documents
        this as an example schema and notes the actual data may vary by tracked
        metrics and aggregation level.
      items:
        $ref: "#/components/schemas/CopilotUserUsageMetricsRecord"

    CopilotAggregatedUsageMetricsReport:
      type: array
      description: |
        Downloaded aggregated enterprise- or organization-level Copilot usage
        metrics report JSON. GitHub documents this as an example schema and notes
        the actual data may vary by tracked metrics and aggregation level.
      items:
        $ref: "#/components/schemas/CopilotAggregatedUsageMetricsRecord"

    CopilotUserUsageMetricsRecord:
      type: object
      additionalProperties: true
      properties:
        code_acceptance_activity_count: { type: integer, minimum: 0 }
        code_generation_activity_count: { type: integer, minimum: 0 }
        day: { type: string, format: date }
        enterprise_id: { type: string }
        organization_id: { type: string }
        loc_added_sum: { type: integer, minimum: 0 }
        loc_deleted_sum: { type: integer, minimum: 0 }
        loc_suggested_to_add_sum: { type: integer, minimum: 0 }
        loc_suggested_to_delete_sum: { type: integer, minimum: 0 }
        totals_by_cli:
          $ref: "#/components/schemas/CopilotCliTotalsWithVersion"
        totals_by_feature:
          type: array
          items: { $ref: "#/components/schemas/CopilotFeatureTotals" }
        totals_by_ide:
          type: array
          items: { $ref: "#/components/schemas/CopilotIdeTotalsWithVersion" }
        totals_by_language_feature:
          type: array
          items: { $ref: "#/components/schemas/CopilotLanguageFeatureTotals" }
        totals_by_language_model:
          type: array
          items: { $ref: "#/components/schemas/CopilotLanguageModelTotals" }
        totals_by_model_feature:
          type: array
          items: { $ref: "#/components/schemas/CopilotModelFeatureTotals" }
        used_agent: { type: boolean }
        used_chat: { type: boolean }
        used_cli: { type: boolean }
        user_id: { type: integer }
        user_login: { type: string }
        user_initiated_interaction_count: { type: integer, minimum: 0 }
        etl_id: { type: string }
        day_partition: { type: string, format: date }
        entity_id_partition: { type: integer }

    CopilotAggregatedUsageMetricsRecord:
      type: object
      additionalProperties: true
      properties:
        day_totals:
          type: array
          items: { $ref: "#/components/schemas/CopilotAggregatedDayTotals" }
        enterprise_id: { type: string }
        organization_id: { type: string }
        report_start_day: { type: string, format: date }
        report_end_day: { type: string, format: date }
        etl_id: { type: string }
        day_partition: { type: string, format: date }
        entity_id_partition: { type: integer }

    CopilotAggregatedDayTotals:
      type: object
      additionalProperties: true
      properties:
        code_acceptance_activity_count: { type: integer, minimum: 0 }
        code_generation_activity_count: { type: integer, minimum: 0 }
        daily_active_cli_users: { type: integer, minimum: 0 }
        daily_active_users: { type: integer, minimum: 0 }
        day: { type: string, format: date }
        enterprise_id: { type: string }
        organization_id: { type: string }
        loc_added_sum: { type: integer, minimum: 0 }
        loc_deleted_sum: { type: integer, minimum: 0 }
        loc_suggested_to_add_sum: { type: integer, minimum: 0 }
        loc_suggested_to_delete_sum: { type: integer, minimum: 0 }
        monthly_active_agent_users: { type: integer, minimum: 0 }
        monthly_active_chat_users: { type: integer, minimum: 0 }
        monthly_active_users: { type: integer, minimum: 0 }
        weekly_active_users: { type: integer, minimum: 0 }
        pull_requests:
          $ref: "#/components/schemas/CopilotPullRequestMetrics"
        totals_by_cli:
          $ref: "#/components/schemas/CopilotCliTotals"
        totals_by_feature:
          type: array
          items: { $ref: "#/components/schemas/CopilotFeatureTotals" }
        totals_by_ide:
          type: array
          items: { $ref: "#/components/schemas/CopilotIdeTotals" }
        totals_by_language_feature:
          type: array
          items: { $ref: "#/components/schemas/CopilotLanguageFeatureTotals" }
        totals_by_language_model:
          type: array
          items: { $ref: "#/components/schemas/CopilotLanguageModelTotals" }
        totals_by_model_feature:
          type: array
          items: { $ref: "#/components/schemas/CopilotModelFeatureTotals" }
        user_initiated_interaction_count: { type: integer, minimum: 0 }

    CopilotTokenUsage:
      type: object
      additionalProperties: true
      properties:
        avg_tokens_per_request: { type: number }
        output_tokens_sum: { type: integer, minimum: 0 }
        prompt_tokens_sum: { type: integer, minimum: 0 }

    CopilotCliVersion:
      type: object
      additionalProperties: true
      properties:
        cli_version: { type: string }
        sampled_at: { type: string, format: date-time }

    CopilotIdeVersion:
      type: object
      additionalProperties: true
      properties:
        ide_version: { type: string }
        sampled_at: { type: string, format: date-time }

    CopilotPluginVersion:
      type: object
      additionalProperties: true
      properties:
        plugin: { type: string }
        plugin_version: { type: string }
        sampled_at: { type: string, format: date-time }

    CopilotCliTotals:
      type: object
      additionalProperties: true
      properties:
        prompt_count: { type: integer, minimum: 0 }
        request_count: { type: integer, minimum: 0 }
        session_count: { type: integer, minimum: 0 }
        token_usage:
          $ref: "#/components/schemas/CopilotTokenUsage"

    CopilotCliTotalsWithVersion:
      allOf:
        - $ref: "#/components/schemas/CopilotCliTotals"
        - type: object
          additionalProperties: true
          properties:
            last_known_cli_version:
              $ref: "#/components/schemas/CopilotCliVersion"

    CopilotFeatureTotals:
      type: object
      additionalProperties: true
      properties:
        code_acceptance_activity_count: { type: integer, minimum: 0 }
        code_generation_activity_count: { type: integer, minimum: 0 }
        feature: { type: string }
        loc_added_sum: { type: integer, minimum: 0 }
        loc_deleted_sum: { type: integer, minimum: 0 }
        loc_suggested_to_add_sum: { type: integer, minimum: 0 }
        loc_suggested_to_delete_sum: { type: integer, minimum: 0 }
        user_initiated_interaction_count: { type: integer, minimum: 0 }

    CopilotIdeTotals:
      type: object
      additionalProperties: true
      properties:
        code_acceptance_activity_count: { type: integer, minimum: 0 }
        code_generation_activity_count: { type: integer, minimum: 0 }
        ide: { type: string }
        loc_added_sum: { type: integer, minimum: 0 }
        loc_deleted_sum: { type: integer, minimum: 0 }
        loc_suggested_to_add_sum: { type: integer, minimum: 0 }
        loc_suggested_to_delete_sum: { type: integer, minimum: 0 }
        user_initiated_interaction_count: { type: integer, minimum: 0 }

    CopilotIdeTotalsWithVersion:
      allOf:
        - $ref: "#/components/schemas/CopilotIdeTotals"
        - type: object
          additionalProperties: true
          properties:
            last_known_ide_version:
              $ref: "#/components/schemas/CopilotIdeVersion"
            last_known_plugin_version:
              $ref: "#/components/schemas/CopilotPluginVersion"

    CopilotLanguageFeatureTotals:
      type: object
      additionalProperties: true
      properties:
        code_acceptance_activity_count: { type: integer, minimum: 0 }
        code_generation_activity_count: { type: integer, minimum: 0 }
        feature: { type: string }
        language: { type: string }
        loc_added_sum: { type: integer, minimum: 0 }
        loc_deleted_sum: { type: integer, minimum: 0 }
        loc_suggested_to_add_sum: { type: integer, minimum: 0 }
        loc_suggested_to_delete_sum: { type: integer, minimum: 0 }

    CopilotLanguageModelTotals:
      type: object
      additionalProperties: true
      properties:
        language: { type: string }
        model: { type: string }
        request_count: { type: integer, minimum: 0 }
        token_usage:
          $ref: "#/components/schemas/CopilotTokenUsage"

    CopilotModelFeatureTotals:
      type: object
      additionalProperties: true
      properties:
        feature: { type: string }
        model: { type: string }
        request_count: { type: integer, minimum: 0 }
        token_usage:
          $ref: "#/components/schemas/CopilotTokenUsage"

    CopilotPullRequestMetrics:
      type: object
      additionalProperties: true
      properties:
        median_minutes_to_merge: { type: number }
        median_minutes_to_merge_copilot_authored: { type: number }
        median_minutes_to_merge_copilot_reviewed: { type: number }
        total_applied_suggestions: { type: integer, minimum: 0 }
        total_copilot_applied_suggestions: { type: integer, minimum: 0 }
        total_copilot_suggestions: { type: integer, minimum: 0 }
        total_created: { type: integer, minimum: 0 }
        total_created_by_copilot: { type: integer, minimum: 0 }
        total_merged: { type: integer, minimum: 0 }
        total_merged_created_by_copilot: { type: integer, minimum: 0 }
        total_merged_reviewed_by_copilot: { type: integer, minimum: 0 }
        total_reviewed: { type: integer, minimum: 0 }
        total_reviewed_by_copilot: { type: integer, minimum: 0 }
        total_suggestions: { type: integer, minimum: 0 }

    GitHubError:
      type: object
      additionalProperties: true
      properties:
        message:
          type: string
        documentation_url:
          type: string
          format: uri
        status:
          type: string

  responses:
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GitHubError"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GitHubError"
    InternalError:
      description: Internal Error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GitHubError"
