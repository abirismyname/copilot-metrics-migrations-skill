      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotAggregatedUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Org"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DateRangeReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_start_day: "2025-07-01"
                    report_end_day: "2025-07-28"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /orgs/{org}/copilot/metrics/reports/users-1-day:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotOrganizationUsersUsageMetricsForDay
      summary: Get Copilot organization users usage metrics for a specific day
      description: |
        Retrieves signed download links for the organization-level user usage metrics
        report for a complete processed day. Downloaded JSON report parts are
