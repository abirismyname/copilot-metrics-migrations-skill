openapi: 3.1.0
info:
  title: GitHub Copilot Usage Metrics Reports API
  version: "2026-03-10"
  description: |
    Reverse-engineered OpenAPI description for the GitHub Enterprise Cloud REST API
    Copilot usage metrics report link endpoints.

    These endpoints return signed download URLs for Copilot usage metrics reports.
    The signed URLs point to JSON report files. GitHub documents example schemas
    for user-level and aggregated enterprise/organization-level report payloads;
    those downloaded report payload shapes are modeled under components.schemas.

    Notes:
      - Requires the "Copilot usage metrics" policy to be enabled everywhere for the enterprise.
      - For GitHub Enterprise Cloud with data residency at GHE.com, replace api.github.com
        with api.SUBDOMAIN.ghe.com.
      - GitHub documentation page was requested with apiVersion=2022-11-28, but the
        examples on the page use X-GitHub-Api-Version: 2026-03-10 for these endpoints.
servers:
  - url: https://api.github.com
    description: GitHub.com REST API
  - url: https://api.{subdomain}.ghe.com
    description: GitHub Enterprise Cloud with data residency
    variables:
      subdomain:
        default: example
        description: Your GHE.com enterprise subdomain
security:
  - bearerAuth: []
tags:
  - name: Copilot usage metrics
    description: Signed report-link endpoints for Copilot usage metrics.

paths:
  /enterprises/{enterprise}/copilot/metrics/reports/enterprise-1-day:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotEnterpriseUsageMetricsForDay
      summary: Get Copilot enterprise usage metrics for a specific day
      description: |
        Retrieves signed download links for the enterprise-level aggregated Copilot
        usage metrics report for a complete processed day. Downloaded JSON report
        parts are expected to conform to CopilotAggregatedUsageMetricsReport.
      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotAggregatedUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Enterprise"
        - $ref: "#/components/parameters/Day"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneDayReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_day: "2025-07-01"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /enterprises/{enterprise}/copilot/metrics/reports/enterprise-28-day/latest:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotEnterpriseUsageMetricsLatest28Days
      summary: Get Copilot enterprise usage metrics
      description: |
        Retrieves signed download links for the latest 28-day enterprise-level
        aggregated Copilot usage metrics report. Downloaded JSON report parts are
        expected to conform to CopilotAggregatedUsageMetricsReport.
      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotAggregatedUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Enterprise"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DateRangeReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_start_day: "2025-07-01"
                    report_end_day: "2025-07-28"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /enterprises/{enterprise}/copilot/metrics/reports/users-1-day:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotEnterpriseUsersUsageMetricsForDay
      summary: Get Copilot users usage metrics for a specific day
      description: |
        Retrieves signed download links for the enterprise-level user usage metrics
        report for a complete processed day. Downloaded JSON report parts are
        expected to conform to CopilotUserUsageMetricsReport.
      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotUserUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Enterprise"
        - $ref: "#/components/parameters/Day"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneDayReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_day: "2025-07-01"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /enterprises/{enterprise}/copilot/metrics/reports/users-28-day/latest:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotEnterpriseUsersUsageMetricsLatest28Days
      summary: Get Copilot users usage metrics
      description: |
        Retrieves signed download links for the latest 28-day enterprise-level
        user usage metrics report. Downloaded JSON report parts are expected to
        conform to CopilotUserUsageMetricsReport.
      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotUserUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Enterprise"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DateRangeReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_start_day: "2025-07-01"
                    report_end_day: "2025-07-28"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /orgs/{org}/copilot/metrics/reports/organization-1-day:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotOrganizationUsageMetricsForDay
      summary: Get Copilot organization usage metrics for a specific day
      description: |
        Retrieves signed download links for the organization-level aggregated
        Copilot usage metrics report for a complete processed day. Downloaded JSON
        report parts are expected to conform to CopilotAggregatedUsageMetricsReport.
      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotAggregatedUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Org"
        - $ref: "#/components/parameters/Day"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneDayReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_day: "2025-07-01"
        "204":
          description: A header with no content is returned.
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /orgs/{org}/copilot/metrics/reports/organization-28-day/latest:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotOrganizationUsageMetricsLatest28Days
      summary: Get Copilot organization usage metrics
      description: |
        Retrieves signed download links for the latest 28-day organization-level
        aggregated Copilot usage metrics report. Downloaded JSON report parts are
