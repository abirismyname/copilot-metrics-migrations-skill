      x-download-content:
        application/json:
          schema:
            $ref: "#/components/schemas/CopilotUserUsageMetricsReport"
      parameters:
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/GitHubApiVersion"
        - $ref: "#/components/parameters/Org"
        - $ref: "#/components/parameters/Day"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneDayReportLinks"
              examples:
                default:
                  value:
                    download_links:
                      - https://example.com/copilot-usage-report-1.json
                      - https://example.com/copilot-usage-report-2.json
                    report_day: "2025-07-01"
        "204":
          description: A header with no content is returned.
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /orgs/{org}/copilot/metrics/reports/users-28-day/latest:
    get:
      tags: [Copilot usage metrics]
      operationId: getCopilotOrganizationUsersUsageMetricsLatest28Days
      summary: Get Copilot organization users usage metrics
      description: |
        Retrieves signed download links for the latest 28-day organization-level
